<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camera Streams</title>
  <style>
    :root { color-scheme: light dark; }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: "Fira Sans", "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
      color: #111;
    }

    h1 { margin: 0 0 20px; font-size: 1.6rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .cam {
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .cam-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
    }

    .cam-header h2 { margin: 0; font-size: 1rem; }

    .links { display: flex; gap: 10px; }

    .links a {
      font-size: 0.8rem;
      color: #0066cc;
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid #0066cc;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }

    .links a:hover {
      background: #0066cc;
      color: #fff;
    }

    .cam img {
      width: 100%;
      height: auto;
      display: block;
      background: #111;
      aspect-ratio: 4/3;
      object-fit: cover;
    }

    .status {
      font-size: 0.75rem;
      color: #666;
      padding: 6px 14px;
      border-top: 1px solid #eee;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #888;
      padding: 48px 0;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #eee; }
      .cam { background: #252525; border-color: #333; }
      .cam-header { border-bottom-color: #333; }
      .status { border-top-color: #333; color: #999; }
      .links a { color: #66aaff; border-color: #66aaff; }
      .links a:hover { background: #66aaff; color: #000; }
    }
  </style>
</head>
<body>
  <h1>📷 Camera Streams</h1>

  <div class="grid">
    {% if indices %}
      {% for idx in indices %}
        <div class="cam">
          <div class="cam-header">
            <h2>Camera {{ idx }}</h2>
            <div class="links">
              <a href="/cam/{{ idx }}/">Full view</a>
              <a href="/cam/{{ idx }}/snapshot.jpg" download="cam{{ idx }}.jpg">Snapshot</a>
            </div>
          </div>
          <img
            src="/cam/{{ idx }}/stream.mjpg"
            alt="Camera {{ idx }} live stream"
            loading="lazy"
            onerror="this.style.opacity='0.3'"
          />
          <div class="status" id="status-{{ idx }}">Connecting…</div>
        </div>
      {% endfor %}
    {% else %}
      <div class="empty">
        <p>No cameras detected.</p>
        <p style="font-size:0.85rem">Plug in a USB camera and refresh the page.</p>
      </div>
    {% endif %}
  </div>

  <script>
    // Show "Live" once each stream's first frame loads
    document.querySelectorAll(".cam img").forEach(img => {
      const camEl = img.closest(".cam");
      const idx = camEl.querySelector("h2").textContent.match(/\d+/)[0];
      const status = document.getElementById("status-" + idx);
      let count = 0;

      img.addEventListener("load", () => {
        count++;
        status.textContent = `Live · Frame ${count}`;
        status.style.color = "#28a745";
      });

      img.addEventListener("error", () => {
        status.textContent = "Stream unavailable";
        status.style.color = "#dc3545";
      });
    });
  </script>
</body>
</html>
